name = "lending-mcp-server"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_SESSION", class_name = "McpSessionDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["McpSessionDO"]

# Set your API key for production via: wrangler secret put ONEDELTA_API_KEY
# For local dev, put it in .dev.vars (gitignored):
#   ONEDELTA_API_KEY=your-key-here
