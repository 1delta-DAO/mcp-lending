services:
  # Standalone MCP server — Streamable HTTP on port 3002
  mcp-server:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      ONEDELTA_API_KEY: ${ONEDELTA_API_KEY}
    restart: unless-stopped

  # MCP client HTTP bridge — connects to mcp-server, exposes chat API on port 3001
  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3001
      MCP_SERVER_URL: http://mcp-server:3002/mcp
    depends_on:
      - mcp-server
    restart: unless-stopped

  # React chat UI served by nginx
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        # The browser must be able to reach this URL — use your server's public IP/hostname.
        VITE_CLIENT_URL: ${VITE_CLIENT_URL:-http://localhost:3001}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "80:80"
    depends_on:
      - client
    restart: unless-stopped
