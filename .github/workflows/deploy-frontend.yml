name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/frontend/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write  # needed to push to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @mcp-lending/frontend build
        env:
          # Vite bakes these into the static bundle at build time.
          # Set VITE_CLIENT_URL in Settings → Secrets and variables → Actions → Variables
          # (use a Repository Variable, not a secret, since it is not sensitive).
          VITE_CLIENT_URL: ${{ vars.VITE_CLIENT_URL || 'http://localhost:3001' }}
          # GitHub Pages project repos are served at /<repo-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/frontend/dist
